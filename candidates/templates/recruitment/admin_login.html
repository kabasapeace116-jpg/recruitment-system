<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MAHIKENG INVESTMENTS | Admin Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #1a1a3e 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(255, 215, 0, 0.03);
            border-radius: 50%;
            bottom: -200px;
            right: -200px;
            animation: float 15s ease-in-out infinite reverse;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(30px, 20px) rotate(10deg); }
        }

        .login-container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 30px;
            padding: 50px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.6s ease;
            position: relative;
            z-index: 1;
            margin: auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Styles */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-wrapper {
            display: inline-block;
            text-align: center;
        }

        .logo-img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            object-fit: cover;
            margin-bottom: 15px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            transition: all 0.3s ease;
        }

        .logo-img:hover {
            transform: scale(1.05);
            border-color: #FFD700;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .company-name {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.7rem;
            color: #64748b;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #334155;
            font-size: 0.9rem;
        }

        label i {
            margin-right: 8px;
            color: #FFD700;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 14px 45px 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #FFD700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            color: #0f0c29;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 4px solid #ef4444;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .footer-links a {
            color: #FFD700;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 20px 15px;
            }
            
            .login-container {
                padding: 30px 25px;
            }
            
            .company-name {
                font-size: 1.2rem;
            }
            
            .logo-img {
                width: 60px;
                height: 60px;
            }
            
            .form-group {
                margin-bottom: 20px;
            }
            
            input, button {
                padding: 12px;
            }
        }

        @media (max-height: 700px) {
            body {
                padding: 20px;
                align-items: flex-start;
            }
            
            .login-container {
                margin-top: 20px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-container">
            <div class="logo-wrapper">
                <img src="{% static 'images/logo.jpeg' %}" alt="MAHIKENG INVESTMENTS" class="logo-img"
                     onerror="this.src='https://via.placeholder.com/80x80/FFD700/0f0c29?text=MI'">
                <div class="company-name">MAHIKENG INVESTMENTS</div>
                <div class="tagline">Global Travel Services & Growth Opportunities</div>
            </div>
        </div>

        {% if form.errors %}
        <div class="error-message">
            <i class="fas fa-exclamation-circle"></i>
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post" action="{% url 'admin_login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label><i class="fas fa-user"></i> Username</label>
                <div class="input-group">
                    <input type="text" name="username" required autofocus placeholder="Enter your username">
                </div>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="password" required placeholder="Enter your password">
                    <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                </div>
            </div>
            <button type="submit">
                <i class="fas fa-arrow-right"></i> Login to Dashboard
            </button>
        </form>

        <div class="footer-links">
            <a href="https://wa.me/qr/KLUYW7MWDG7DC1?utm_source=chatgpt.com">
                <i class="fas fa-user-plus"></i> Powered By KABASA
            </a>
        </div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.querySelector('.toggle-password');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
        
        // Ensure page is scrollable
        window.onload = function() {
            document.body.style.overflowY = 'auto';
        };
    </script>
</body>
</html>
